<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 React Fusion State — Real-Build Demo</title>
    <link rel="stylesheet" href="styles.css">
    <!-- React peer dependencies, mirroring a real consumer setup -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- The actual library, bundled from dist/ by scripts/build-demo.js -->
    <script src="./react-fusion-state.umd.js"></script>
</head>
<body>
    <div class="container">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        // === Real exports from the published library ===
        // (loaded above from ./react-fusion-state.umd.js, which esbuild
        //  produces by bundling dist/index.js — the exact code that ships
        //  to npm consumers.)
        const {
            FusionStateProvider,
            useFusionState,
            useFusionStateLog,
            useFusionHydrated,
        } = ReactFusionState;

        const STORAGE_KEY = 'fusion_state_all'; // fixed prefix in the lib

        // ---------------------------------------------------------------
        // Components — exercise the real public API surface.
        // ---------------------------------------------------------------

        const PersistentCounter = () => {
            const [count, setCount] = useFusionState('counter', 0);

            return (
                <div className="demo-box">
                    <h3>
                        <span className="emoji">🔢</span>
                        Persistent Counter
                    </h3>
                    <div className="value">{count}</div>
                    <div className="button-group">
                        <button className="button primary" onClick={() => setCount(count + 1)}>
                            ➕ Increment
                        </button>
                        <button className="button secondary" onClick={() => setCount(count - 1)}>
                            ➖ Decrement
                        </button>
                        <button className="button danger" onClick={() => setCount(0)}>
                            🔄 Reset
                        </button>
                    </div>
                </div>
            );
        };

        const PersistentName = () => {
            const [name, setName] = useFusionState('name', '');

            return (
                <div className="demo-box">
                    <h3>
                        <span className="emoji">👤</span>
                        Persistent Name
                    </h3>
                    <div className="input-group">
                        <label htmlFor="name-input">Enter your name:</label>
                        <input
                            id="name-input"
                            type="text"
                            value={name}
                            onChange={(e) => setName(e.target.value)}
                            placeholder="Type your name here..."
                        />
                    </div>
                    {name && (
                        <div className="value">Hello, {name}! 👋</div>
                    )}
                </div>
            );
        };

        // Showcases useFusionHydrated — the hook that was rewritten in
        // the audit. Should flip to ✅ on first render in the web sync
        // path, and stay ❌ longer in async-storage scenarios.
        const HydrationStatus = () => {
            const isHydrated = useFusionHydrated();
            return (
                <div className="demo-box">
                    <h3>
                        <span className="emoji">💧</span>
                        Hydration Status
                    </h3>
                    <div className="value" style={{fontSize: '1.5rem'}}>
                        {isHydrated ? '✅ Hydrated' : '⏳ Loading…'}
                    </div>
                    <p style={{color: '#555', fontSize: '0.9rem'}}>
                        <code>useFusionHydrated()</code> returns the real
                        hydration flag from the provider context. On web with
                        synchronous <code>localStorage</code>, this is
                        <code>true</code> immediately.
                    </p>
                </div>
            );
        };

        // Live state observer — exercises useFusionStateLog without the
        // dead useState that the audit removed.
        const StateObserver = () => {
            const fullState = useFusionStateLog();
            return (
                <div className="demo-box">
                    <h3>
                        <span className="emoji">🧪</span>
                        Live State (useFusionStateLog)
                    </h3>
                    <pre className="debug" style={{margin: 0}}>
                        {JSON.stringify(fullState, null, 2)}
                    </pre>
                </div>
            );
        };

        const DebugInfo = () => {
            const [counter] = useFusionState('counter', 0);
            const [name] = useFusionState('name', '');

            const storedData = localStorage.getItem(STORAGE_KEY);

            return (
                <div className="demo-box">
                    <h3>
                        <span className="emoji">🔍</span>
                        localStorage Inspector
                    </h3>
                    <div className="debug">
                        <div>Current state:</div>
                        <div>  • counter: {counter}</div>
                        <div>  • name: "{name}"</div>
                        <br />
                        <div>localStorage[{`"${STORAGE_KEY}"`}]:</div>
                        <div>  {storedData || '<empty>'}</div>
                        <br />
                        <button
                            className="button danger"
                            onClick={() => {
                                localStorage.removeItem(STORAGE_KEY);
                                window.location.reload();
                            }}
                        >
                            🗑️ Clear & Reload
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [debugMode, setDebugMode] = useState(false);

            return (
                <>
                    <h1>🚀 React Fusion State</h1>
                    <div className="version-tag">
                        Version v{ReactFusionState.VERSION}
                    </div>
                    <div className="subtitle">
                        Real-build demo — loads <code>./react-fusion-state.umd.js</code> (bundled from <code>dist/</code>).
                    </div>

                    <div className="status-box">
                        <h3>✅ This demo runs the actual library code</h3>
                        <p><strong>Try this:</strong> change values, refresh the page — they persist.</p>
                        <p><strong>Debug mode:</strong> toggle to see internal logs in the console (state diffs, save events).</p>
                        <p><strong>Validation:</strong> open DevTools → Application → Local Storage and watch the <code>fusion_state_all</code> key.</p>
                    </div>

                    <div className="debug-control">
                        <h2>🎛️ Debug Control</h2>
                        <label>
                            <input
                                type="checkbox"
                                checked={debugMode}
                                onChange={(e) => setDebugMode(e.target.checked)}
                            />
                            <strong>Debug Mode {debugMode ? '(check console 📝)' : '(silent 🤫)'}</strong>
                        </label>
                        <div className="description">
                            Toggling this remounts the provider with <code>debug={'{'}true{'}'}</code>,
                            so you can see persistence saves and state diffs in the console.
                        </div>
                    </div>

                    <FusionStateProvider
                        key={debugMode ? 'debug' : 'silent'}
                        persistence={['counter', 'name']}
                        debug={debugMode}
                    >
                        <HydrationStatus />
                        <PersistentCounter />
                        <PersistentName />
                        <StateObserver />
                        <DebugInfo />
                    </FusionStateProvider>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        console.log('🚀 React Fusion State demo started — using the real bundled library.');
    </script>
</body>
</html>
