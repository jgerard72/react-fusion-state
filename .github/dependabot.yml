version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      jest:
        patterns:
          - jest
          - ts-jest
          - jest-environment-jsdom
          - "@types/jest"
          - "@testing-library/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/jest"
      tooling:
        patterns:
          - esbuild
          - prettier
          - typescript
          - tsconfig-paths*
    ignore:
      # Hold off major bumps that require manual migration passes.
      # Tracked as dedicated tech-debt issues; flip these off once each
      # migration has landed on a separate branch with green CI.
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest-environment-jsdom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
