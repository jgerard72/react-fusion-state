version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      jest:
        patterns:
          - jest
          - ts-jest
          - jest-environment-jsdom
          - "@types/jest"
          - "@testing-library/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/jest"
      tooling:
        patterns:
          - esbuild
          - prettier
          - typescript
          - tsconfig-paths*
    ignore:
      # Hold off major bumps that require manual migration passes.
      # Tracked as dedicated tech-debt issues; flip these off once each
      # migration has landed on a separate branch with green CI.
      # (Jest stack migration: #12 landed -> ignores removed.)
      # (ESLint cleanup: #13 landed -> ignore removed.)
      # (TypeScript 4 -> 6 migration: #14 landed; the typescript ignore
      # is kept conservatively in case a future TS 7 surfaces an issue;
      # flip off in a one-line follow-up PR once 6.x is proven stable in
      # production usage.)
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
