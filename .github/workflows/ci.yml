name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --reporters=default --reporters=github-actions

      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build & verify tarball
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify npm tarball contents
        run: |
          # --ignore-scripts: skip the prepare hook (build already ran above)
          # so its stdout cannot pollute the --json output.
          npm pack --dry-run --json --ignore-scripts > /tmp/pack.json
          node -e "
            const p = JSON.parse(require('fs').readFileSync('/tmp/pack.json', 'utf8'))[0];
            const leaked = p.files.filter(f => /^(assets|src|benchmark|demo|coverage|scripts|\.github)\//.test(f.path));
            if (leaked.length) {
              console.error('Files leaked into npm tarball:');
              leaked.forEach(f => console.error('  - ' + f.path));
              process.exit(1);
            }
            console.log('Tarball clean:', p.files.length, 'files,', (p.size/1024).toFixed(1), 'KB');
          "
